<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>After All</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="ink-full.js"></script>
    <style>
      @font-face {
        font-family: 'Coming Soon';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url(ComingSoon-Regular.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      body {
        background: #222 center left;
        display: flex;
        justify-content: center;
        transition: background 10s ease-out 2s;
      }

      main {
        width: min(800px, 100vw);
        font-family: "Coming Soon", sans-serif;
      }

      #story {
        color: whitesmoke;
      }

      #storyChoice {
        color: lightblue;
        display: flex;
        justify-content: flex-start;
        gap: 2rem;
      }

      #storyChoice > a:hover {
        cursor: pointer;
        text-decoration: underline;
      }

      p, a {
        opacity: 0%;
        filter: drop-shadow(#111 .2rem .2rem .1rem);
        animation: show 400ms ease-in forwards;
      }

      @keyframes show {
        100% {
          opacity: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="story"></div>
      <div id="storyChoice"></div>
    </main>
    <script>
      const storyContainer = document.getElementById("story");
      const storyChoiceContainer = document.getElementById("storyChoice");
      const audio = new Audio("https://dj.pew.bio/share/s/eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE4MDg1MTk4NDAsImlkIjoiVWt1T2s2RlFlQUtkWDdQczBqTUkxciIsImlzcyI6Ik5EIn0.so8lUZTxS55_LW923fcZmB8pn_ozb1xWhIxjc77ey5M");
      const image = "https://imgs.pew.bio/api/v1/t/1e34b5d3e24b386a3fe784194a08226e1ab1bcf7/7z75e5yz/fit_5120";

      let story;
      fetch('story.ink')
        .then(async (response) => {
          story = new inkjs.Compiler(await response.text()).Compile();
          continueStory();
        });

      async function continueStory() {
        while (story.canContinue) {
          const paragraphElement = document.createElement('p');
          paragraphElement.textContent = story.Continue();
          paragraphElement.styleTags(story.currentTags);
          storyContainer.appendChild(paragraphElement);

          if (story.currentTags[0] === "beginscene") {
            audio.volume = 0
            audio.play()
            document.body.style.background = `url('${image}') center right / cover no-repeat fixed`;
            setTimeout(async () => {
              while (audio.volume < 0.5) {
                audio.volume+=0.01
                await new Promise(resolve => setTimeout(resolve, 200));
              }
            }, 0)
          }

          await new Promise(resolve => setTimeout(resolve, 750));
        }

        for (const choice of story.currentChoices) {
          const choiceElement = document.createElement('a');
          choiceElement.textContent = choice.text;
          choiceElement.styleTags(choice.tags);
          storyChoiceContainer.appendChild(choiceElement);

          choiceElement.addEventListener("click", (event) => {
            event.preventDefault();
            story.ChooseChoiceIndex(choice.index);
            storyChoiceContainer.replaceChildren(); // remove existing choices
            continueStory();
          });
        }
      }

      HTMLElement.prototype.styleTags =
        function (tags) {
          const color = tags[0]?.trim();
          if (color) {
            this.style.color = color;
          }
          if (tags.includes("inline")) {
            this.style.display = "inline";
          }
          if (tags.includes("italic")) {
            this.style.fontStyle = "italic";
          }
        }
    </script>
  </body>
</html>
